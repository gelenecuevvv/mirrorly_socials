<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#FFFFFF" />
    <meta
      name="description"
      content="Mirrorly CDO — Luxury Mirror Photobooth Experience. Refer & Get Up to ₱500!"
    />
    <title>Mirrorly CDO — Mirror Photobooth</title>
    <link rel="stylesheet" href="./style.css" />
  </head>

  <body>
    <main class="page" role="main">
      <section class="card" aria-label="Mirrorly CDO">
        <header class="hero">
          <h1 class="title">
            <img
              class="logo"
              src="./mirrorly_cdo_logo.png"
              alt="Mirrorly CDO"
              decoding="async"
              fetchpriority="high"
            />
          </h1>
          <p class="tagline">Luxury Mirror Photobooth Experience</p>
          <p class="subtagline">Perfect for weddings, debuts, birthdays, and special events.</p>
          <p class="promo">Refer &amp; Get Up to ₱500!</p>
        </header>

        <section class="qr-stack" aria-label="Social QR codes">
          <div class="qr-section">
            <h2 class="qr-title">Scan me:</h2>
            <img
              class="qr-image"
              alt="Instagram QR code"
              width="240"
              height="240"
              loading="lazy"
              decoding="async"
              src="./ig.jpeg"
            />
          </div>

          <div class="divider" role="separator" aria-hidden="true"></div>

          <div class="qr-section">
            <h2 class="qr-title">Scan me:</h2>
            <img
              class="qr-image"
              alt="Facebook QR code"
              width="240"
              height="240"
              loading="lazy"
              decoding="async"
              src="./fb.jpeg"
            />
          </div>
        </section>
      </section>
    </main>
  </body>
</html>
